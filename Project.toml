name = "StructHelpers"
uuid = "4093c41a-2008-41fd-82b8-e3f9d02b504f"
authors = ["Jan Weidner <jw3126@gmail.com> and contributors"]
version = "1.6.0"

[deps]
ConstructionBase = "187b0558-2788-49d3-abe0-74a17ed4e7c9"

[compat]
Aqua = "0.8, 1"
ConstructionBase = "1.3"
JET = "0.9, 0.10, 0.11"
StructTypes = "1"
# `Test` is a stdlib. On Julia < 1.11 it is reported as unversioned
# (matched by `<0.0.1`); on Julia >= 1.11 it has a real version (matched
# by `1`). The union keeps Aqua's `test_deps_compat` check happy on all
# supported Julia versions.
Test = "<0.0.1, 1"
julia = "1.6"

[extras]
Aqua = "4c88cf16-eb10-579e-8560-4a9242c79595"
JET = "c3a54625-cd67-489e-a8e7-0a5a0ff4e31b"
StructTypes = "856f2bd8-1eba-4b0a-8007-ebc267875bd4"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Aqua", "JET", "Test", "StructTypes"]
